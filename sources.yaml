defaults:
  # Seconds to wait between requests. Be a good citizen.
  request_delay: 1.0

filters:
  # A job notifies if it matches ANY title keyword AND ANY location,
  # and matches NO exclude term. An empty list means no constraint on that axis.
  title_keywords:
    - devops
    - platform
    - sre
    - site reliability
    - reliability engineer
    - infrastructure
  locations:
    - chennai
  exclude:
    - intern
    - manager
    - director

sources:
  - company: stripe
    ats: greenhouse
    token: stripe
    priority: high

  - company: spotify
    ats: lever
    token: spotify

  # Chennai-hiring companies (DevOps/Platform/SRE coverage)
  - company: freshworks
    ats: smartrecruiters
    token: Freshworks

  - company: tekion
    ats: greenhouse
    token: tekion
